<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍華科技大學 - 課程查詢系統</title>
    <style>
        body { font-family: "微軟正黑體", sans-serif; margin: 20px; background-color: #f8f9fa; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; text-align: left; margin-bottom: 20px; }
        
        .filter-panel { 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px 20px; 
            background: #e9ecef; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
        }
        
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #495057; }
        
        .filter-group input { 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #ced4da; 
            background-color: white; 
            font-size: 14px;
            height: 40px; 
            box-sizing: border-box;
        }
        
        .btn-group { display: flex; gap: 10px; align-items: flex-end; height: 100%; }
        
        button { 
            height: 40px; 
            flex: 1; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            transition: 0.3s; 
            font-size: 14px;
        }
        
        .search-btn { background-color: #0056b3; }
        .search-btn:hover { background-color: #004494; }
        .reset-btn { background-color: #6c757d; }
        .reset-btn:hover { background-color: #5a6268; }
        
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin-top: 10px; 
            table-layout: fixed; 
            word-wrap: break-word;
        }
        th, td { 
            border: 1px solid #dee2e6; 
            padding: 12px 8px; 
            text-align: center; 
            font-size: 15px;
            vertical-align: middle;
        }
        th { background-color: #0056b3; color: white; font-weight: bold; }

        .col-class    { width: 16%; }
        .col-course   { width: 22%; }
        .col-required { width: 10%; }
        .col-credit   { width: 15%; }
        .col-time     { width: 12%; }
        .col-teacher  { width: 12%; }
        .col-room     { width: 13%; }

        .nowrap { white-space: nowrap; }
        .credit-badge { color: #d9534f; font-weight: bold; }
        .pending-text { color: #adb5bd; font-style: italic; }
        
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f4f9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏫 龍華科技大學 課表查詢系統</h1>
        
        <div class="filter-panel">
            <div class="filter-group">
                <label>班級名稱</label>
                <input type="text" id="sel-class" list="list-class" placeholder="請選擇或輸入班級">
                <datalist id="list-class"></datalist>
            </div>
            <div class="filter-group">
                <label>課程名稱</label>
                <input type="text" id="sel-course" list="list-course" placeholder="請選擇或輸入課程">
                <datalist id="list-course"></datalist>
            </div>
            <div class="filter-group">
                <label>必/選修</label>
                <input type="text" id="sel-required" list="list-required" placeholder="請選擇或輸入必/選修">
                <datalist id="list-required"></datalist>
            </div>
            <div class="filter-group">
                <label>學分/時數</label>
                <input type="text" id="sel-credit" list="list-credit" placeholder="請選擇或輸入學分數">
                <datalist id="list-credit"></datalist>
            </div>
            
            <div class="filter-group">
                <label>上課時間</label>
                <input type="text" id="sel-time" list="list-time" placeholder="請選擇或輸入時間">
                <datalist id="list-time"></datalist>
            </div>
            <div class="filter-group">
                <label>授課教師</label>
                <input type="text" id="sel-teacher" list="list-teacher" placeholder="請選擇或輸入教師">
                <datalist id="list-teacher"></datalist>
            </div>
            <div class="filter-group">
                <label>教室</label>
                <input type="text" id="sel-room" list="list-room" placeholder="請選擇或輸入教室">
                <datalist id="list-room"></datalist>
            </div>
            <div class="btn-group">
                <button onclick="applyFilters()" class="search-btn">🔍 組合篩選</button>
                <button onclick="resetFilters()" class="reset-btn">🔄 重設</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="col-class">班級名稱</th>
                    <th class="col-course">課程名稱</th>
                    <th class="col-required">必/選修</th>
                    <th class="col-credit">學分 / 時數</th>
                    <th class="col-time">上課時間</th>
                    <th class="col-teacher">授課教師</th>
                    <th class="col-room">教室</th>
                </tr>
            </thead>
            <tbody id="course-list">
                <tr><td colspan="7">資料載入中，請稍後... ⏳</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let allCoursesData = [];

        async function init() {
            try {
                const response = await fetch('./courses.json');
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                // 1. 過濾髒資料
                let filteredData = data.filter(c => 
                    (c.class_name && c.class_name.toString().length >= 2) || 
                    (c.course_name && c.course_name.toString().length >= 2)
                );

                // ✨ 2. 預設排序邏輯：按「班級名稱」排序
                filteredData.sort((a, b) => {
                    const classA = (a.class_name || "").toString();
                    const classB = (b.class_name || "").toString();
                    return classA.localeCompare(classB, 'zh-Hant'); // 支援中英文混合排序
                });

                allCoursesData = filteredData;

                populateDropdowns(allCoursesData);
                renderTable(allCoursesData);
            } catch (e) {
                document.getElementById('course-list').innerHTML = `<tr><td colspan="7" style="color: red;">載入失敗: ${e.message}</td></tr>`;
            }
        }

        // --- 以下功能邏輯保持不變 ---

        function cleanSymbols(str) {
            return (str || '').toString().replace(/\s*[,，/;；]\s*/g, '、').trim();
        }

        function populateDropdowns(data) {
            const classes = new Set(), courses = new Set(), requireds = new Set(), 
                  credits = new Set(), times = new Set(), teachers = new Set(), rooms = new Set();
            
            data.forEach(c => {
                if (c.class_name) classes.add(c.class_name.trim());
                if (c.course_name) courses.add(c.course_name.trim());
                if (c.required_elective) requireds.add(c.required_elective.trim());
                if (c.schedule) times.add(c.schedule.trim());
                
                let tStr = cleanSymbols(c.teacher);
                if (tStr && tStr !== 'null') teachers.add(tStr);
                let rStr = cleanSymbols(c.classroom);
                if (rStr && rStr !== 'null') rooms.add(rStr);
                let parts = (c.hours_credit || '').split('-');
                if (parts.length === 3) credits.add(parseFloat(parts[2]).toString());
            });

            fillDatalist('list-class', [...classes].sort());
            fillDatalist('list-course', [...courses].sort());
            fillDatalist('list-required', [...requireds].sort());
            fillDatalist('list-credit', [...credits].sort((a,b)=>a-b));
            fillDatalist('list-time', [...times].sort());
            fillDatalist('list-teacher', [...teachers].sort());
            fillDatalist('list-room', [...rooms].sort());
        }

        function fillDatalist(id, arr) {
            const el = document.getElementById(id);
            el.innerHTML = ''; 
            arr.forEach(val => {
                let opt = document.createElement("option");
                opt.value = val;
                el.appendChild(opt);
            });
        }

        function applyFilters() {
            const fClass = document.getElementById('sel-class').value.trim();
            const fCourse = document.getElementById('sel-course').value.trim();
            const fRequired = document.getElementById('sel-required').value.trim();
            const fCredit = document.getElementById('sel-credit').value.trim();
            const fTime = document.getElementById('sel-time').value.trim();
            const fTeacher = document.getElementById('sel-teacher').value.trim();
            const fRoom = document.getElementById('sel-room').value.trim();

            const filtered = allCoursesData.filter(c => {
                let parts = (c.hours_credit || '').split('-');
                let cCredit = parts.length === 3 ? parseFloat(parts[2]).toString() : "";
                let tStr = cleanSymbols(c.teacher);
                let rStr = cleanSymbols(c.classroom);

                return (!fClass || (c.class_name || '').includes(fClass)) &&
                       (!fCourse || (c.course_name || '').includes(fCourse)) &&
                       (!fRequired || (c.required_elective || '').includes(fRequired)) &&
                       (!fCredit || cCredit === fCredit) &&
                       (!fTime || (c.schedule || '').includes(fTime)) &&
                       (!fTeacher || tStr.includes(fTeacher)) &&
                       (!fRoom || rStr.includes(fRoom));
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const body = document.getElementById('course-list');
            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="7">查無符合條件的課程</td></tr>';
                return;
            }
            body.innerHTML = data.map(c => {
                const getDisplay = (val) => {
                    const str = (val || '').toString().trim();
                    if (str === '' || str === 'null' || str === '0' || str === '00') return '<span class="pending-text">待定</span>';
                    return cleanSymbols(str);
                };
                let parts = (c.hours_credit || '').split('-');
                let creditDisplay = (parts.length === 3 && parts[2] !== '0.00') ? 
                    `<div class="nowrap"><span class="credit-badge">${parseFloat(parts[2])}學分</span> / ${parseFloat(parts[0])+parseFloat(parts[1])}小時</div>` : 
                    '<span class="pending-text">待定</span>';
                return `<tr>
                    <td>${getDisplay(c.class_name)}</td>
                    <td><strong>${getDisplay(c.course_name)}</strong></td>
                    <td>${getDisplay(c.required_elective)}</td>
                    <td>${creditDisplay}</td>
                    <td>${getDisplay(c.schedule)}</td>
                    <td>${getDisplay(c.teacher)}</td>
                    <td>${getDisplay(c.classroom)}</td>
                </tr>`;
            }).join('');
        }

        function resetFilters() {
            document.querySelectorAll('.filter-group input').forEach(input => input.value = '');
            renderTable(allCoursesData);
        }

        window.onload = init;
    </script>
</body>
</html>
